<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro</title>
<script src="C:\Users\fabia\OneDrive\Documentos\Cursos Diversos\Leticia Smirelli\Intensivo Power BI\Aula 1"></script>
<style>
    body {
        font-family: Arial;
        margin: 20px;
        background: #f4f6f9;
    }
    h1 {
        text-align: center;
    }
    .kpi-container {
        display: flex;
        gap: 20px;
        margin-bottom: 20px;
    }
    .kpi {
        flex: 1;
        background: white;
        padding: 15px;
        border-radius: 8px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        text-align: center;
    }
    canvas {
        background: white;
        padding: 10px;
        border-radius: 8px;
        margin-top: 20px;
    }
    table {
        width: 100%;
        margin-top: 20px;
        border-collapse: collapse;
        background: white;
    }
    th, td {
        padding: 8px;
        border-bottom: 1px solid #ddd;
        text-align: left;
    }
</style>
</head>

<body>

<h1>Dashboard Financeiro</h1>

<div class="kpi-container">
    <div class="kpi">
        <h3>Receitas</h3>
        <p id="receitas"></p>
    </div>
    <div class="kpi">
        <h3>Despesas</h3>
        <p id="despesas"></p>
    </div>
    <div class="kpi">
        <h3>Saldo Final</h3>
        <p id="saldo"></p>
    </div>
</div>

<canvas id="graficoMensal"></canvas>
<canvas id="graficoPizza"></canvas>

<table id="tabela">
    <thead>
        <tr>
            <th>Data</th>
            <th>Tipo</th>
            <th>Detalhes</th>
            <th>Valor</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>

// ================= DADOS (extraídos da planilha) =================
const dados = [
    // Colei aqui alguns exemplos — substitua pelo dataset completo se quiser mais volume
    {data: "2025-01-19", tipo: "Receita", valor: 47869.10},
    {data: "2025-01-15", tipo: "Receita", valor: 24872.49},
    {data: "2025-01-07", tipo: "Despesa", valor: -15425.64},
    {data: "2025-01-08", tipo: "Receita", valor: 30520.85},
    {data: "2025-01-01", tipo: "Despesa", valor: -22512.12}
];

// ================= KPIs =================
let receitas = 0;
let despesas = 0;

dados.forEach(d => {
    if (d.valor > 0) receitas += d.valor;
    else despesas += d.valor;
});

document.getElementById("receitas").innerText = receitas.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
document.getElementById("despesas").innerText = despesas.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
document.getElementById("saldo").innerText = (receitas + despesas).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

// ================= AGRUPAMENTO MENSAL =================
let meses = {};
dados.forEach(d => {
    let mes = d.data.substring(0,7);
    if (!meses[mes]) meses[mes] = 0;
    meses[mes] += d.valor;
});

const labels = Object.keys(meses);
const valores = Object.values(meses);

// ================= GRÁFICO MENSAL =================
new Chart(document.getElementById("graficoMensal"), {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Resultado Mensal',
            data: valores
        }]
    }
});

// ================= GRÁFICO PIZZA =================
new Chart(document.getElementById("graficoPizza"), {
    type: 'pie',
    data: {
        labels: ['Receitas', 'Despesas'],
        datasets: [{
            data: [receitas, Math.abs(despesas)]
        }]
    }
});

// ================= TABELA =================
const tbody = document.querySelector("#tabela tbody");

dados.forEach(d => {
    let tr = document.createElement("tr");
    tr.innerHTML = `
        <td>${d.data}</td>
        <td>${d.tipo}</td>
        <td>-</td>
        <td>${d.valor.toLocaleString('pt-BR', {style:'currency', currency:'BRL'})}</td>
    `;
    tbody.appendChild(tr);
});

</script>

</body>
</html>
